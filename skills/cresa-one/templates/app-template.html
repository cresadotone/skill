:root{
  color-scheme:dark;
  --bg:#000;--bg-1:#0a0a0a;--bg-2:#0f0f0f;--bg-3:#141414;
  --line:#1f1f1f;--line-2:#262626;--input:#404040;
  --txt:#fafafa;--txt-2:#a3a3a3;--txt-3:#858585;
  --accent:#fafafa;--accent-contrast:#0a0a0a;--accent-soft:rgba(250,250,250,.14);
  --ok:oklch(.78 .14 150);--warn:oklch(.82 .13 85);--err:oklch(.68 .18 25);--info:oklch(.75 .11 240);
  --destructive:var(--err);
  --elev-1:rgba(255,255,255,.04);--elev-2:rgba(255,255,255,.09);
  --btn-outline:rgba(255,255,255,.1);
  --backdrop:rgba(0,0,0,.55);
  --shadow-pop:0 16px 36px rgba(0,0,0,.45);
  --r:8px;--r-sm:6px;
  --ease-out:cubic-bezier(.16,1,.3,1);--ease-in:cubic-bezier(.4,0,1,1);
  --z-drawer:40;--z-cmdbar:50;--z-modal:55;--z-toast:60;
  --mono:'Geist Mono',ui-monospace,Menlo,monospace;--sans:'Geist Sans',system-ui,sans-serif;
  --pixel:'Geist Pixel Square',var(--mono);
}
[hidden]{display:none!important}
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
/* hide scrollbars everywhere, unconditionally — base rule (no media-query gating) so it
   is in effect on first paint and never flashes a native bar during/after a resize.
   Scrolling still works (wheel/trackpad/touch); only the visual bar is suppressed. */
*{scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{width:0;height:0;display:none}
html{scroll-behavior:smooth}
body{background:var(--bg);
  color:var(--txt);font-family:var(--sans);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;min-height:100dvh}
::selection{background:var(--accent);color:var(--accent-contrast)}
a{color:var(--txt);text-decoration:underline;text-decoration-color:rgba(255,255,255,.25);text-underline-offset:3px}
a:hover{text-decoration-color:var(--accent)}
:focus-visible{outline:1px solid var(--accent);outline-offset:2px}
.mono,.money,.sfval,.probcell,.kpi .n,tbody td{font-variant-numeric:tabular-nums}
.wrap{max-width:2560px;margin:0 auto;width:100%;padding:clamp(16px,2vw,40px) clamp(14px,2.4vw,48px) 90px}

/* header */
header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px}
.brand h1{font-family:var(--pixel);font-size:20px;font-weight:400;letter-spacing:.04em;display:flex;align-items:center;gap:12px}
.dot{width:9px;height:9px;background:var(--accent)}
.brand .sub{color:var(--txt-3);font-family:var(--mono);font-size:11px;margin-top:7px;letter-spacing:.05em;text-transform:uppercase}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:clamp(9px,0.8vw,14px);margin-bottom:20px}
.kpi{background:var(--bg-1);border:1px solid var(--line);
  border-radius:var(--r);padding:15px 16px;position:relative;overflow:hidden;cursor:pointer;
  transition:border-color .15s,background .15s;color:var(--txt);font:inherit;text-align:left;width:100%}
.kpi:hover{border-color:var(--line-2);background:var(--bg-2)}
.kpi.on{border-color:var(--input);background:var(--bg-2)}
#pkpis .kpi{cursor:default}
.kpi .n{font-family:var(--pixel);font-size:26px;font-weight:400;line-height:1;letter-spacing:.02em}
.kpi .l{color:var(--txt-3);font-family:var(--mono);font-size:10px;font-weight:600;margin-top:9px;text-transform:uppercase;letter-spacing:.09em}
.kpi.k-notfound .n{color:var(--txt-3)}
.kpi .bar{position:absolute;left:0;bottom:0;height:2px;background:var(--accent);width:100%}

/* toolbar */
.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-wrap{position:relative;flex:1;min-width:240px}
.search-wrap input{width:100%;background:var(--bg-1);border:1px solid var(--line-2);border-radius:var(--r-sm);
  color:var(--txt);font-family:var(--sans);font-size:13.5px;padding:10px 36px 10px 36px;outline:none;
  transition:border-color .15s}
.search-wrap input::placeholder{color:var(--txt-2);opacity:1}
.search-wrap input::-webkit-search-cancel-button{-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--input);box-shadow:0 0 0 3px var(--accent-soft)}
.search-wrap .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt-3);font-size:14px}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--txt-3);cursor:pointer;font-size:16px;display:none}
.search-clear:hover{color:var(--txt)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:transparent;border:1px solid var(--btn-outline);color:var(--txt-2);border-radius:var(--r-sm);
  padding:6px 11px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;
  cursor:pointer;white-space:nowrap;font-family:var(--mono);
  transition:color .12s,border-color .12s,background .12s;display:flex;align-items:center;gap:7px}
.chip:hover{background:var(--elev-1);color:var(--txt)}
.chip.on{background:var(--accent);border-color:transparent;color:var(--accent-contrast)}
.chip .c{font-size:10px;color:var(--txt-3)}
.chip.on .c{color:inherit;opacity:.6}
.spacer{flex:1}
.count-note{color:var(--txt-3);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em}

/* table */
.tablecard{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.scroll{overflow-x:auto;overscroll-behavior-inline:contain;scrollbar-width:thin;scrollbar-color:var(--input) var(--bg-2)}
.scroll::-webkit-scrollbar,.drawer .db::-webkit-scrollbar,.cb-list::-webkit-scrollbar{display:block;width:8px;height:8px}
.scroll::-webkit-scrollbar-track,.drawer .db::-webkit-scrollbar-track,.cb-list::-webkit-scrollbar-track{background:var(--bg-2)}
.scroll::-webkit-scrollbar-thumb,.drawer .db::-webkit-scrollbar-thumb,.cb-list::-webkit-scrollbar-thumb{background:var(--input);border:2px solid var(--bg-2);border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:0;z-index:3;background:var(--bg-3);color:var(--txt-2);text-align:left;
  font-family:var(--mono);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;padding:11px 14px;
  border-bottom:1px solid var(--line-2);white-space:nowrap;user-select:none}
thead th:hover{color:var(--txt)}
.sortbtn{appearance:none;background:none;border:0;color:inherit;cursor:pointer;display:flex;align-items:center;font:inherit;letter-spacing:inherit;text-transform:inherit;white-space:nowrap;width:100%;text-align:left}
thead th .ar{color:var(--accent);font-size:9px;margin-left:4px;opacity:0}
thead th.sorted .ar{opacity:1}
tbody td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap}
tbody tr{cursor:pointer;transition:background .12s}
tbody tr:hover{background:var(--elev-1)}
tbody tr:focus-visible{outline:1px solid var(--accent);outline-offset:-2px;background:var(--elev-1)}
tbody tr:last-child td{border-bottom:none}
tbody tr.owned{box-shadow:inset 2px 0 0 var(--accent)}
tbody tr.rowsel,tbody tr.rowsel:hover{background:var(--elev-2)}
tbody tr.rowsel{box-shadow:inset 2px 0 0 var(--accent)}
.person{font-weight:500;color:var(--txt)}
.muted{color:var(--txt-3)}
.mono{font-family:var(--mono);font-size:12px;color:var(--txt-2)}
.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.04em;
  padding:2.5px 8px;border-radius:5px;border:1px solid transparent;white-space:nowrap}
.b-yes{background:var(--accent);color:var(--accent-contrast)}
.b-no{background:transparent;color:var(--txt-2);border-color:var(--line-2)}
.b-own{background:var(--line-2);color:var(--txt-2)}
.b-unassigned{background:var(--line-2);color:var(--txt-2)}
.b-notfound{background:transparent;color:var(--txt-3);border-color:var(--line)}
.b-noowner{background:transparent;color:var(--txt-2);border-color:var(--line-2);border-style:dashed}
.owner{font-family:var(--mono);font-size:12px;color:var(--txt);display:inline-flex;align-items:center;gap:6px}
.owner .av{width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;
  font-size:8.5px;font-weight:600;background:var(--line-2);color:var(--txt);flex:0 0 auto}
.empty-row td{text-align:center;color:var(--txt-3);padding:48px;font-family:var(--pixel);font-size:13px;letter-spacing:.06em;text-transform:uppercase}
.empty-action{display:block;margin:12px auto 0;background:transparent;border:1px solid var(--btn-outline);border-radius:var(--r-sm);color:var(--txt);cursor:pointer;font:600 11px var(--mono);padding:8px 12px;text-transform:uppercase}
.b-deal{background:var(--line-2);color:var(--txt)}
.taskdot{font-family:var(--mono);font-size:10.5px;color:var(--txt-2);margin-left:7px;white-space:nowrap}
.stage{display:inline-block;font-family:var(--mono);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  padding:2px 7px;border-radius:5px;border:1px solid transparent;margin-left:7px;vertical-align:middle}
.st-open{border-color:var(--line-2);color:var(--txt)}
.st-won{background:var(--accent);color:var(--accent-contrast)}
.st-lost{border-color:var(--destructive);color:var(--destructive);background:rgba(208,49,49,.08)}
.st-closed{border-color:var(--line);color:var(--txt-3)}
/* drawer enrichment sections */
.esec{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
.eh{font-family:var(--mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-3);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.eh .ec{background:var(--bg-3);border:1px solid var(--line-2);border-radius:5px;padding:1px 7px;font-family:var(--mono);font-size:10px;color:var(--txt-2)}
.eitem{padding:7px 0;border-bottom:1px solid var(--line)}
.eitem:last-child{border-bottom:none}
.eitem .et{font-size:12.5px;color:var(--txt);line-height:1.4}
.eitem .em{font-family:var(--mono);font-size:11px;color:var(--txt-3);margin-top:3px}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);opacity:0;pointer-events:none;
  transition:opacity .25s;z-index:var(--z-drawer)}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(460px,94vw);background:var(--bg-1);
  border-left:1px solid var(--line-2);transform:translateX(100%);
  transition:transform .25s var(--ease-out);z-index:calc(var(--z-drawer) + 1);display:flex;flex-direction:column}
.drawer.on{transform:translateX(0)}
.drawer .dh{padding:max(22px,env(safe-area-inset-top)) max(22px,env(safe-area-inset-right)) 16px 22px;border-bottom:1px solid var(--line)}
.drawer .dh .x{position:absolute;top:18px;right:18px;background:none;border:none;color:var(--txt-3);
  font-size:22px;cursor:pointer;line-height:1}
.drawer .dh .x:hover{color:var(--txt)}
.drawer h2{font-size:17px;font-weight:600;letter-spacing:-.01em;padding-right:30px}
.drawer .co{color:var(--txt-2);font-family:var(--mono);font-size:12px;margin-top:4px}
.drawer .db{padding:18px max(22px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) 22px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--input) var(--bg-2)}
.fld{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid var(--line)}
.fld .k{color:var(--txt-3);font-family:var(--mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;flex:0 0 auto}
.fld .v{text-align:right;font-family:var(--mono);font-size:12px;color:var(--txt);word-break:break-word}
.linkbtn{display:inline-block;margin:4px 0 0 6px;background:transparent;border:1px solid var(--btn-outline);
  border-radius:var(--r-sm);padding:5px 10px;font-family:var(--mono);font-size:11px;color:var(--txt-2);cursor:pointer;
  text-decoration:none;transition:background .12s,color .12s}
.linkbtn:hover{background:var(--elev-1);color:var(--txt);text-decoration:none}
.copyrow{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.copyrow button{background:transparent;border:1px solid var(--btn-outline);color:var(--txt-2);border-radius:var(--r-sm);
  padding:8px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:background .12s,color .12s}
.copyrow button:hover{background:var(--elev-1);color:var(--txt)}
.copyrow button:active{background:var(--elev-2)}

/* toasts — bottom-center stack, Scroll v2 motion */
.toasts{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;
  align-items:center;gap:8px;z-index:var(--z-toast);pointer-events:none}
.toast{pointer-events:auto;display:inline-flex;align-items:center;gap:9px;max-width:min(480px,90vw);
  background:color-mix(in srgb,var(--bg-2) 86%,transparent);border:1px solid var(--line-2);color:var(--txt-2);
  border-radius:8px;padding:8px 14px;font:500 12px/1.4 var(--mono);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast b{color:var(--txt);font-weight:600}
.toast .ti{width:8px;height:8px;flex:0 0 auto}
.toast.t-success .ti{background:var(--ok)}
.toast.t-error .ti{background:var(--err)}
.toast.t-warning .ti{background:var(--warn)}
.toast.t-info .ti{background:var(--info)}
.toast.t-in{animation:toast-enter .25s var(--ease-out) both}
.toast.t-out{animation:toast-exit .2s var(--ease-in) both}
@keyframes toast-enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-exit{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(10px)}}

@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}

/* view tabs */
.viewtabs{display:inline-flex;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--r-sm);padding:3px;gap:3px}
.vtab{background:none;border:none;color:var(--txt-2);font-family:var(--mono);font-size:12px;font-weight:500;
  padding:7px 16px;border-radius:4px;cursor:pointer;transition:background .14s,color .14s,box-shadow .14s,transform .12s var(--ease-out);letter-spacing:.02em}
.vtab:hover{color:var(--txt)}
.vtab.on{background:var(--bg);color:var(--txt);box-shadow:inset 0 0 0 1px var(--line-2)}
.vtab .vc{margin-left:7px;font-size:10.5px;opacity:.6}

/* pipeline */
.kpi .n.sm{font-size:20px}
.grouphdr td{background:var(--bg-2);border-bottom:1px solid var(--line-2);border-top:1px solid var(--line-2);
  padding:10px 14px;position:sticky;top:0;z-index:2}
.grouphdr .gh{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.grouphdr .gname{font-family:var(--pixel);font-weight:400;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt);display:flex;align-items:center;gap:9px}
.grouphdr .gcount{font-family:var(--mono);font-size:10.5px;color:var(--txt-2);background:var(--bg-3);border:1px solid var(--line-2);border-radius:5px;padding:1px 8px}
.grouphdr .gtot{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--txt-2);display:flex;gap:16px}
.grouphdr .gtot b{color:var(--txt);font-weight:600}
.grouphdr .gtot .sf{color:var(--txt-2)}
.dot-st{width:8px;height:8px;flex:0 0 auto}
.money{font-family:var(--mono);font-size:12.5px;color:var(--txt);font-weight:500}
.sfval{font-family:var(--mono);font-size:12px;color:var(--txt-2)}
.b-acq{background:var(--line-2);color:var(--txt-2)}
.b-disp{background:transparent;color:var(--txt-2);border-color:var(--line-2)}
.probcell{font-family:var(--mono);font-size:11.5px;color:var(--txt-2)}
.probbar{display:inline-block;width:42px;height:5px;border-radius:3px;background:var(--line);overflow:hidden;vertical-align:middle;margin-right:7px;border:1px solid var(--line-2)}
.probbar i{display:block;height:100%;background:var(--accent)}

/* ---- responsive: fluid up to 2560, graceful down to mobile ---- */
@media(max-width:960px){.hide-md{display:none!important}}
@media(max-width:680px){.hide-sm{display:none!important}}
@media(max-width:520px){.hide-xs{display:none!important}}
/* cap the text-heavy name/company columns so one long name can't blow out the table */
td.person{max-width:300px;overflow:hidden;text-overflow:ellipsis}
tbody td:nth-child(2){max-width:240px;overflow:hidden;text-overflow:ellipsis}
@media(max-width:960px){td.person{max-width:200px}tbody td:nth-child(2){max-width:160px}}
@media(max-width:680px){td.person{max-width:150px}tbody td:nth-child(2){max-width:130px}}
/* large displays: scale type so the table fills wide viewports instead of going sparse */
@media(min-width:1800px){body{font-size:15px}table{font-size:14px}thead th{font-size:11px}
  .kpi .n{font-size:30px}tbody td,thead th{padding:13px 18px}}
@media(min-width:2200px){.wrap{padding-top:48px}table{font-size:14.5px}tbody td,thead th{padding:15px 22px}}
/* tablet */
@media(max-width:960px){tbody td,thead th{padding:10px 12px}}
/* tablet + mobile: pin the first column so the name stays visible while the rest scrolls */
@media(max-width:960px){
  thead th:first-child,tbody td:first-child{position:sticky;left:0;z-index:2;background:var(--bg-1);box-shadow:1px 0 0 var(--line)}
  thead th:first-child{z-index:5;background:var(--bg-3)}
  tbody tr.owned td:first-child{box-shadow:inset 2px 0 0 var(--accent),1px 0 0 var(--line)}
  .grouphdr td:first-child{position:static;box-shadow:none}
}
@media(max-width:680px){
  tbody td,thead th{padding:10px 11px}
  header{gap:12px}
}
@media(max-width:640px){
  .brand h1{font-size:17px}.brand .sub{font-size:10px}
  .viewtabs{width:100%;justify-content:center}
  .vtab{flex:1;text-align:center;padding:8px 10px}
  .kpi{padding:12px 13px}.kpi .n{font-size:20px}.kpi .n.sm{font-size:16px}.kpi .l{font-size:9px}
  .search-wrap{min-width:0;flex:1 1 100%}
  .drawer{width:100vw}
  .grouphdr .gtot{font-size:11px;gap:10px}
}
@media(max-width:400px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.wrap{padding-bottom:60px}}

/* ---- interaction feedback ---- */
.chip,.vtab,.kpi,.copyrow button,.linkbtn,.search-clear,.kbdbtn{transition:transform .12s var(--ease-out),background .12s,border-color .12s,color .12s}
.chip:active,.vtab:active,.copyrow button:active,.linkbtn:active,.kbdbtn:active{transform:scale(.97)}
.kpi:active{transform:scale(.99)}
#pkpis .kpi:active{transform:none}
tbody tr:active{background:var(--elev-2)}

/* ---- header command-bar hint ---- */
.kbdbtn{display:inline-flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--btn-outline);
  border-radius:var(--r-sm);padding:7px 10px;cursor:pointer;color:var(--txt-2);font:500 11px var(--mono)}
.kbdbtn:hover{background:var(--elev-1);color:var(--txt)}
.kbdbtn kbd,.cb-footer kbd,.hkrow kbd{font:500 10px var(--mono);background:var(--bg-3);border:1px solid var(--line-2);
  border-radius:4px;padding:2px 5px;min-width:16px;text-align:center;color:var(--txt-2)}

/* ---- command bar (ported from Scroll v2 cmdk) ---- */
.cb-overlay{position:fixed;inset:0;background:linear-gradient(145deg,rgba(0,0,0,.2),rgba(0,0,0,.5));
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:var(--z-cmdbar);animation:cb-fade .2s var(--ease-out) both}
.cb-dialog{position:fixed;top:18%;left:0;right:0;margin:0 auto;width:640px;max-width:92vw;max-height:70dvh;
  background:var(--bg-1);border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-pop);
  z-index:calc(var(--z-cmdbar) + 1);display:flex;flex-direction:column;overflow:hidden;
  animation:cb-in .25s var(--ease-out) both}
.cb-dialog.closing,.cb-overlay.closing{animation:cb-out .15s var(--ease-in) both}
@keyframes cb-in{from{opacity:0;transform:translateY(-6px) scale(.98)}to{opacity:1;transform:none}}
@keyframes cb-out{from{opacity:1}to{opacity:0}}
@keyframes cb-fade{from{opacity:0}to{opacity:1}}
.cb-inputrow{height:48px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
.cb-glyph{color:var(--txt-3);font:600 13px var(--mono)}
.cb-input{flex:1;height:100%;background:none;border:none;outline:none;color:var(--txt);
  font:500 15px var(--sans);caret-color:var(--accent)}
.cb-input::placeholder{color:var(--txt-2);font-weight:400;opacity:1}
.cb-badge{background:var(--bg-3);border:1px solid var(--line);color:var(--txt-3);border-radius:4px;
  padding:3px 7px;font:600 10px var(--mono);letter-spacing:.06em;white-space:nowrap}
.cb-list{flex:1;min-height:80px;max-height:420px;overflow-y:auto;overscroll-behavior:contain;padding:6px;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--input) var(--bg-2)}
.cb-list.kbnav .cb-item{pointer-events:none}
.cb-group{padding:10px 10px 4px;font:600 10px var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--txt-3);user-select:none}
.cb-item{height:40px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 10px;
  border-radius:6px;cursor:pointer;color:var(--txt-2);font:400 13px var(--sans);margin-bottom:1px}
.cb-item:hover{background:var(--elev-1)}
.cb-item[data-selected]{background:var(--elev-2);color:var(--txt)}
.cb-item .ci-left{display:flex;align-items:center;gap:10px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cb-item .ci-ic{width:16px;text-align:center;color:var(--txt-3);font-family:var(--mono);font-size:12px;flex:0 0 auto}
.cb-item[data-selected] .ci-ic{color:var(--accent)}
.cb-item .ci-kbd{font:500 10px var(--mono);color:var(--txt-3);letter-spacing:.02em;opacity:.8;white-space:nowrap}
.cb-item .ci-note{font:400 11px var(--mono);color:var(--txt-3)}
.cb-empty{padding:32px 10px;text-align:center;color:var(--txt-3);font:400 13px var(--pixel);letter-spacing:.05em;text-transform:uppercase}
.cb-footer{height:28px;border-top:1px solid var(--line);background:var(--bg-2);border-radius:0 0 11px 11px;
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;
  font:400 11px var(--mono);color:var(--txt-3);user-select:none}
.cb-footer .hints{display:flex;gap:12px;align-items:center}
.cb-footer .hints span{display:inline-flex;gap:4px;align-items:center}
@media(max-width:680px){.cb-dialog{top:8%;width:94vw}.cb-item .ci-kbd{display:none}}

/* ---- confirm modal ---- */
.modal-backdrop{position:fixed;inset:0;background:var(--backdrop);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:var(--z-modal);display:flex;align-items:center;justify-content:center;padding:16px;
  animation:cb-fade .2s var(--ease-out) both}
.modal{background:var(--bg-1);border:1px solid var(--line-2);border-radius:12px;width:min(460px,94vw);
  padding:20px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow-pop);
  z-index:calc(var(--z-modal) + 1);animation:modal-in .25s var(--ease-out) both}
@keyframes modal-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal-badge{align-self:flex-start;background:var(--bg-3);border:1px solid var(--line-2);color:var(--txt-2);
  border-radius:4px;padding:3px 8px;font:600 10px var(--mono);letter-spacing:.08em;text-transform:uppercase}
.modal-badge.danger{border-color:var(--err);color:var(--err);background:transparent}
.modal h3{font:600 15px var(--sans);letter-spacing:-.01em}
.modal-sub{color:var(--txt-2);font:400 13px/1.55 var(--sans)}
.modal-sub .hkrow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:5px 0;border-bottom:1px solid var(--line)}
.modal-sub .hkrow:last-child{border-bottom:none}
.modal-sub .hkrow .keys{display:flex;gap:4px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:2px}
.btn-ghost,.btn-primary,.btn-danger{border-radius:var(--r-sm);padding:9px 14px;font:600 12.5px var(--sans);
  cursor:pointer;border:1px solid var(--btn-outline);transition:transform .12s var(--ease-out),background .12s,color .12s,border-color .12s}
.btn-ghost{background:transparent;color:var(--txt-2)}
.btn-ghost:hover{background:var(--elev-1);color:var(--txt)}
.btn-primary{background:var(--accent);color:var(--accent-contrast);border-color:transparent}
.btn-primary:hover{opacity:.88}
.btn-danger{background:transparent;color:var(--err);border-color:var(--err)}
.btn-danger:hover{background:color-mix(in srgb,var(--err) 14%,transparent)}
.btn-ghost:active,.btn-primary:active,.btn-danger:active{transform:scale(.97)}

/* ---- theme presets: same structure, tinted neutrals + one accent each ---- */
[data-theme=graphite]{
  --bg:oklch(.12 .008 250);--bg-1:oklch(.15 .01 250);--bg-2:oklch(.17 .01 250);--bg-3:oklch(.2 .012 250);
  --line:oklch(.24 .012 250);--line-2:oklch(.28 .014 250);--input:oklch(.44 .02 250);
  --txt:oklch(.97 .004 250);--txt-2:oklch(.73 .012 250);--txt-3:oklch(.62 .012 250);
  --accent:oklch(.8 .07 245);--accent-contrast:oklch(.14 .02 250);--accent-soft:oklch(.8 .07 245 / .15)}
[data-theme=phosphor]{
  --bg:oklch(.11 .01 150);--bg-1:oklch(.14 .012 150);--bg-2:oklch(.16 .013 150);--bg-3:oklch(.19 .015 150);

  --elev-1:rgba(0,0,0,.045);--elev-2:rgba(0,0,0,.08);

[data-theme=paper] a{text-decoration-color:rgba(0,0,0,.25)}

<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1><span class="dot" aria-hidden="true"></span> __APP_TITLE__</h1>
      <div class="sub" id="meta"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="viewtabs" id="viewtabs" role="tablist" aria-label="Workspace view">
        <button type="button" class="vtab" id="tab-records" role="tab" aria-controls="records" data-view="records">Records<span class="vc" id="vc-rec"></span></button>
        <button type="button" class="vtab" id="tab-board" role="tab" aria-controls="board" data-view="board">Board<span class="vc" id="vc-board"></span></button>
      </div>
      <button class="kbdbtn" id="cmdopen" title="Command bar (⌘K)" aria-label="Open command bar"><kbd>⌘</kbd><kbd>K</kbd></button>
    </div>
  </header>

  <section id="records" role="tabpanel" aria-labelledby="tab-records">
    <div class="kpis" id="kpis"></div>
    <div class="toolbar">
      <div class="search-wrap">
        <label class="sr-only" for="q">Search records</label>
        <span class="ic" aria-hidden="true">⌕</span>
        <input type="search" id="q" placeholder="Search name, company, email, owner…" autocomplete="off"/>
        <button type="button" class="search-clear" id="qclear" aria-label="Clear search" title="Clear search">×</button>
      </div>
      <div class="chips" id="srcchips"></div>
    </div>
    <div class="toolbar" style="margin-top:-4px">
      <div class="chips" id="statchips"></div>
      <div class="spacer"></div>
      <div class="count-note" id="cnote"></div>
    </div>
    <div class="tablecard"><div class="scroll"><table aria-label="Records">
      <thead><tr id="head"></tr></thead>
      <tbody id="body"></tbody>
    </table></div></div>
  </section>

  <section id="board" role="tabpanel" aria-labelledby="tab-board" style="display:none">
    <div class="kpis" id="pkpis"></div>
    <div class="toolbar">
      <div class="chips" id="pipechips"></div>
      <div class="spacer"></div>
      <div class="count-note" id="pcnote"></div>
    </div>
    <div class="tablecard"><div class="scroll"><table aria-label="Records grouped by stage">
      <thead><tr id="phead"></tr></thead>
      <tbody id="pbody"></tbody>
    </table></div></div>
  </section>
</div>

<div class="scrim" id="scrim" aria-hidden="true"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="dname" aria-describedby="dco" aria-hidden="true" inert>
  <div class="dh"><button type="button" class="x" id="dx" aria-label="Close record details" title="Close details">×</button><h2 id="dname"></h2><div class="co" id="dco"></div></div>
  <div class="db" id="ddb"></div>
</aside>
<div class="cb-overlay" id="cbov" aria-hidden="true" hidden></div>
<div class="cb-dialog" id="cb" role="dialog" aria-modal="true" aria-label="Command bar" hidden>
  <div class="cb-inputrow">
    <span class="cb-glyph">⌘</span>
    <input class="cb-input" id="cbq" role="combobox" aria-controls="cblist" aria-expanded="false" aria-autocomplete="list" placeholder="Type a command or search…" autocomplete="off" spellcheck="false"/>
    <span class="cb-badge">__APP_BADGE__</span>
  </div>
  <div class="cb-list" id="cblist" role="listbox" aria-label="Commands"></div>
  <div class="cb-footer">
    <div class="hints"><span><kbd>↑↓</kbd> navigate</span><span><kbd>↵</kbd> run</span><span><kbd>esc</kbd> close</span></div>
    <span id="cbcount"></span>
  </div>
</div>

<div class="modal-backdrop" id="mbk" hidden>
  <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="mtitle" aria-describedby="mbody">
    <div class="modal-badge" id="mbadge"></div>
    <h3 id="mtitle"></h3>
    <div class="modal-sub" id="mbody"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="mcancel">Cancel</button>
      <button class="btn-primary" id="mok">Confirm</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
/* ── placeholder data ─────────────────────────────────────────────────────────
   Fictional sample rows so the skeleton renders every component on first open.
   Replace DATA with your real rows (same shape) — or set DATA = [] and hydrate
   however you like. Nothing else in this file needs to change.
   Row shape:
     { id, name, company, status:'active'|'open', stage, owner, email,
       value:number, updated:'M/D/YYYY', source, url:'https://…',
       sections:[{title, items:[{title, meta}]}] }                            */
const DATA=[
 {id:'r1',name:'Ada Lovelace',company:'Analytical Engines Ltd',status:'active',stage:'In progress',owner:'Grace Hopper',email:'ada@example.com',value:120000,updated:'7/14/2026',source:'demo-a',url:'https://example.com/records/1',
  sections:[{title:'Notes',items:[{title:'Kickoff call complete',meta:'7/2/2026 · Grace Hopper'},{title:'Waiting on spec review',meta:'7/9/2026'}]},
            {title:'Activity',items:[{title:'Emailed draft proposal',meta:'7/14/2026 · Grace Hopper'}]}]},
 {id:'r2',name:'Alan Turing',company:'Bletchley Systems',status:'active',stage:'Review',owner:'Grace Hopper',email:'alan@example.com',value:84000,updated:'7/11/2026',source:'demo-a',url:'https://example.com/records/2',
  sections:[{title:'Notes',items:[{title:'Security questionnaire returned',meta:'7/10/2026 · Alan Turing'}]}]},
 {id:'r3',name:'Grace Hopper',company:'Compiler Works',status:'open',stage:'Backlog',owner:'',email:'grace@example.com',value:0,updated:'6/28/2026',source:'demo-b',url:''},
 {id:'r4',name:'Katherine Johnson',company:'Orbital Analytics',status:'active',stage:'Done',owner:'Margaret Hamilton',email:'katherine@example.com',value:250000,updated:'7/1/2026',source:'demo-b',url:'https://example.com/records/4',
  sections:[{title:'Activity',items:[{title:'Contract signed',meta:'7/1/2026 · Margaret Hamilton'},{title:'Final trajectory review',meta:'6/27/2026'}]}]},
 {id:'r5',name:'Margaret Hamilton',company:'Apollo Guidance Co',status:'open',stage:'In progress',owner:'',email:'',value:45000,updated:'7/16/2026',source:'demo-a',url:'https://example.com/records/5'},
 {id:'r6',name:'Claude Shannon',company:'Signal & Noise Inc',status:'open',stage:'Backlog',owner:'Alan Turing',email:'claude@example.com',value:0,updated:'6/20/2026',source:'demo-b',url:''},
 {id:'r7',name:'Edsger Dijkstra',company:'Shortest Path BV',status:'active',stage:'Blocked',owner:'Ada Lovelace',email:'edsger@example.com',value:30000,updated:'7/8/2026',source:'demo-a',url:'https://example.com/records/7',
  sections:[{title:'Notes',items:[{title:'Blocked on vendor dependency',meta:'7/8/2026 · Ada Lovelace'}]}]},
 {id:'r8',name:'Barbara Liskov',company:'Substitution Labs',status:'open',stage:'Review',owner:'',email:'barbara@example.com',value:66000,updated:'7/18/2026',source:'demo-b',url:'https://example.com/records/8'}
];

/* ── columns ── */
const COLS = [
  {k:'name',label:'Name'},{k:'company',label:'Company'},
  {k:'status',label:'Status'},{k:'stage',label:'Stage',c:'hide-sm'},
  {k:'owner',label:'Owner',c:'hide-md'},{k:'value',label:'Value'},
  {k:'updated',label:'Updated',c:'hide-sm'},
  {k:'email',label:'Email',c:'hide-md'},{k:'source',label:'Source',c:'hide-md'}
];
const LS='__APP_SLUG__';
const def={q:'',stat:'all',src:'all',sortK:'updated',sortDir:-1,view:'records',boardStat:'all',pSortK:'',pSortDir:-1,theme:'mono'};
let st=load();
function load(){try{return Object.assign({},def,JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){return Object.assign({},def)}}
function save(){localStorage.setItem(LS,JSON.stringify(st))}

/* ── helpers ── */
const norm=s=>(s||'').toLowerCase();
const h=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const safeUrl=u=>{try{const x=new URL(u);return x.protocol==='https:'?x.href:''}catch(e){return ''}};
const num=x=>{if(typeof x==='number')return x;const n=parseFloat(String(x||'').replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;};
const dnum=v=>{const m=(v||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);if(!m)return 0;let y=+m[3];y=y<100?y+2000:y;return y*10000+(+m[1])*100+(+m[2]);};
const fmtMoney=n=>{n=num(n);if(!n)return '';return n>=1e6?'$'+(n/1e6).toFixed(n>=1e7?0:1)+'M':n>=1e3?'$'+Math.round(n/1e3)+'k':'$'+n.toLocaleString('en-US',{maximumFractionDigits:0});};
const fmtMoneyFull=n=>{n=num(n);return n?'$'+n.toLocaleString('en-US',{maximumFractionDigits:0}):'';};
function avatar(name){
  if(!name)return '';
  const init=name.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return `<span class="av" aria-hidden="true">${h(init)}</span>`;
}
function ownerCell(name){return name?`<span class="owner">${avatar(name)}${h(name)}</span>`:'<span class="muted">—</span>';}
function statusBadge(r){return r.status==='active'?'<span class="badge b-yes">■ Active</span>':'<span class="badge b-no">□ Open</span>';}
function stageKind(s){return /done|complete|shipped|won/i.test(s)?'won':/blocked|lost|cancel|dead/i.test(s)?'lost':/archived|closed/i.test(s)?'closed':'open';}
function stageBadge(s){if(!s)return '';return `<span class="stage st-${stageKind(s)}">${h(s)}</span>`;}
function stageColor(s){return {won:'var(--txt-2)',lost:'var(--destructive)',closed:'var(--txt-3)',open:'var(--txt)'}[stageKind(s)];}
function valueCell(r){return num(r.value)?`<span class="money">${fmtMoneyFull(r.value)}</span>`:'<span class="muted">—</span>';}

function searchBlob(r){return norm([r.name,r.company,r.email,r.owner,r.stage,r.source].join(' '));}
function matchesStat(r,v){
  if(v==='active')return r.status==='active';
  if(v==='open')return r.status!=='active';
  if(v==='unowned')return !r.owner;
  if(v==='linked')return !!safeUrl(r.url);
  if(v==='valued')return num(r.value)>0;
  return true;
}

function visible(){
  let rows=DATA.slice();
  if(st.src!=='all')rows=rows.filter(r=>r.source===st.src);
  if(st.stat!=='all')rows=rows.filter(r=>matchesStat(r,st.stat));
  const q=norm(st.q.trim());
  if(q)rows=rows.filter(r=>searchBlob(r).includes(q));
  const k=st.sortK,d=st.sortDir;
  rows.sort((a,b)=>{
    let x=a[k]||'',y=b[k]||'';
    if(k==='status'){x=a.status==='active'?1:0;y=b.status==='active'?1:0;}
    else if(k==='value'){x=num(a.value);y=num(b.value);}
    else if(k==='updated'){x=dnum(a.updated);y=dnum(b.updated);}
    if(x<y)return -1*d; if(x>y)return 1*d;
    return (a.name||'').localeCompare(b.name||'');
  });
  return rows;
}

function renderKpis(){
  const n=DATA.length;
  const active=DATA.filter(r=>r.status==='active').length;
  const unowned=DATA.filter(r=>!r.owner).length;
  const items=[
    {cls:'',n:n,l:'Records',stat:'all'},
    {cls:'k-owned',n:active,l:'Active',stat:'active'},
    {cls:'k-open',n:n-active,l:'Open',stat:'open'},
    {cls:'k-notfound',n:unowned,l:'Unowned',stat:'unowned'},
    {cls:'k-val',n:fmtMoney(DATA.reduce((s,r)=>s+num(r.value),0))||'$0',l:'Total value',stat:'valued',sm:1},
  ];
  document.getElementById('kpis').innerHTML=items.map(i=>
    `<button type="button" class="kpi ${i.cls} ${st.stat===i.stat?'on':''}" data-stat="${i.stat}" aria-pressed="${st.stat===i.stat}">
       <div class="n${i.sm?' sm':''}">${i.n}</div><div class="l">${i.l}</div>
       ${st.stat===i.stat?'<div class="bar"></div>':''}</button>`).join('');
  document.querySelectorAll('#kpis .kpi').forEach(el=>el.onclick=()=>{st.stat=el.dataset.stat;save();renderAll();});
}

function renderChips(){
  const stats=[['all','All'],['active','Active'],['open','Open'],['unowned','Unowned'],['linked','Has link'],['valued','Has value']];
  document.getElementById('statchips').innerHTML=stats.map(([v,l])=>{
    const c=v==='all'?DATA.length:DATA.filter(r=>matchesStat(r,v)).length;
    return `<button type="button" class="chip ${st.stat===v?'on':''}" data-stat="${v}" aria-pressed="${st.stat===v}">${l}<span class="c">${c}</span></button>`;
  }).join('');
  document.querySelectorAll('#statchips .chip').forEach(el=>el.onclick=()=>{st.stat=el.dataset.stat;save();renderAll();});

  const srcs=['all',...[...new Set(DATA.map(r=>r.source).filter(Boolean))]];
  document.getElementById('srcchips').innerHTML=srcs.map(s=>{
    const lbl=s==='all'?'All sources':s.slice(0,26);
    const c=s==='all'?DATA.length:DATA.filter(r=>r.source===s).length;
    return `<button type="button" class="chip ${st.src===s?'on':''}" data-src="${h(s)}" aria-pressed="${st.src===s}">${h(lbl)}<span class="c">${c}</span></button>`;
  }).join('');
  document.querySelectorAll('#srcchips .chip').forEach(el=>el.onclick=()=>{st.src=el.dataset.src;save();renderAll();});
}

function renderHead(){
  document.getElementById('head').innerHTML=COLS.map(c=>
    `<th scope="col" class="${st.sortK===c.k?'sorted ':''}${c.c||''}"${st.sortK===c.k?` aria-sort="${st.sortDir<0?'descending':'ascending'}"`:''}><button type="button" class="sortbtn" data-k="${c.k}">${c.label}<span class="ar" aria-hidden="true">${st.sortDir<0?'▼':'▲'}</span></button></th>`).join('');
  document.querySelectorAll('#head .sortbtn').forEach(btn=>btn.onclick=()=>{
    const k=btn.dataset.k; if(st.sortK===k)st.sortDir*=-1;else{st.sortK=k;st.sortDir=1;}
    save();renderAll();
  });
}

function renderBody(){
  const rows=visible();
  const tb=document.getElementById('body');
  if(!rows.length){tb.innerHTML=`<tr class="empty-row"><td colspan="${COLS.length}">No records match current search and filters<button type="button" class="empty-action" id="clearfilters">Clear filters</button></td></tr>`;}
  else tb.innerHTML=rows.map(r=>{
    return `<tr class="${r.status==='active'?'owned':''}" data-i="${DATA.indexOf(r)}" tabindex="0">
      <td class="person" title="${h(r.name||'')}">${r.name?h(r.name):'<span class=muted>—</span>'}</td>
      <td title="${h(r.company||'')}">${r.company?h(r.company):'<span class=muted>—</span>'}</td>
      <td>${statusBadge(r)}</td>
      <td class="hide-sm">${stageBadge(r.stage)||'<span class="muted">—</span>'}</td>
      <td class="hide-md">${ownerCell(r.owner)}</td>
      <td>${valueCell(r)}</td>
      <td class="mono hide-sm">${h(r.updated||'—')}</td>
      <td class="mono hide-md">${h(r.email||'—')}</td>
      <td class="muted mono hide-md" title="${h(r.source||'')}">${h((r.source||'').slice(0,14))}</td>
    </tr>`;
  }).join('');
  wireRows('#body tr[data-i]','i');
  const clear=document.getElementById('clearfilters');
  if(clear)clear.onclick=()=>{st.q='';st.stat='all';st.src='all';save();renderAll();document.getElementById('q').focus();};
  document.getElementById('cnote').textContent=`${rows.length} of ${DATA.length} shown`;
}

/* ── board view (grouped by stage) ── */
const PCOLS=[
  {k:'name',label:'Record'},{k:'company',label:'Company',c:'hide-xs'},{k:'owner',label:'Owner',c:'hide-sm'},
  {k:'updated',label:'Updated',c:'hide-xs'},{k:'value',label:'Value'},{k:'status',label:'Status',c:'hide-md'}
];
const boardDone=r=>['won','closed'].includes(stageKind(r.stage||''));
function boardRows(){return DATA.filter(r=>st.boardStat==='open'?!boardDone(r):st.boardStat==='done'?boardDone(r):true);}

function renderPKpis(){
  const open=DATA.filter(r=>!boardDone(r));
  const openVal=open.reduce((s,r)=>s+num(r.value),0);
  const allVal=DATA.reduce((s,r)=>s+num(r.value),0);
  const items=[
    {cls:'k-pipe',n:DATA.length,l:'Records'},
    {cls:'k-open',n:open.length,l:'Open'},
    {cls:'k-owned',n:DATA.length-open.length,l:'Done'},
    {cls:'k-val',n:fmtMoney(openVal)||'$0',l:'Open value',sm:1},
    {cls:'k-val',n:fmtMoney(allVal)||'$0',l:'Total value',sm:1},
  ];
  document.getElementById('pkpis').innerHTML=items.map(i=>
    `<div class="kpi ${i.cls}"><div class="n${i.sm?' sm':''}">${i.n}</div><div class="l">${i.l}</div></div>`).join('');
}
function renderBoardChips(){
  const c={all:DATA.length,open:DATA.filter(r=>!boardDone(r)).length,done:DATA.filter(boardDone).length};
  document.getElementById('pipechips').innerHTML=[['all','All'],['open','Open'],['done','Done']].map(([v,l])=>
    `<button type="button" class="chip ${st.boardStat===v?'on':''}" data-ps="${v}" aria-pressed="${st.boardStat===v}">${l}<span class="c">${c[v]}</span></button>`).join('');
  document.querySelectorAll('#pipechips .chip').forEach(el=>el.onclick=()=>{st.boardStat=el.dataset.ps;save();renderBoard();});
}
function renderPHead(){
  document.getElementById('phead').innerHTML=PCOLS.map(col=>
    `<th scope="col" class="${st.pSortK===col.k?'sorted ':''}${col.c||''}"${st.pSortK===col.k?` aria-sort="${st.pSortDir<0?'descending':'ascending'}"`:''}><button type="button" class="sortbtn" data-pk="${col.k}">${col.label}<span class="ar" aria-hidden="true">${st.pSortDir<0?'▼':'▲'}</span></button></th>`).join('');
  document.querySelectorAll('#phead .sortbtn').forEach(btn=>btn.onclick=()=>{
    const k=btn.dataset.pk; if(st.pSortK===k)st.pSortDir*=-1;else{st.pSortK=k;st.pSortDir=1;}
    save();renderBoard();});
}
function renderBoard(){
  renderPKpis(); renderBoardChips(); renderPHead();
  const rows=boardRows();
  const tb=document.getElementById('pbody');
  if(!rows.length){tb.innerHTML=`<tr class="empty-row"><td colspan="${PCOLS.length}">No records match current board filter<button type="button" class="empty-action" id="clearboard">Show all records</button></td></tr>`;
    document.getElementById('clearboard').onclick=()=>{st.boardStat='all';save();renderBoard();};
    document.getElementById('pcnote').textContent='0 records';return;}
  const groups={};
  rows.forEach(r=>{const k=r.stage||'(no stage)';(groups[k]=groups[k]||[]).push(r);});
  const keys=Object.keys(groups).sort((a,b)=>{
    const oa=groups[a].some(r=>!boardDone(r))?0:1, ob=groups[b].some(r=>!boardDone(r))?0:1;
    if(oa!==ob)return oa-ob;
    return Math.max(...groups[b].map(r=>dnum(r.updated)))-Math.max(...groups[a].map(r=>dnum(r.updated)));
  });
  let html='';
  keys.forEach(k=>{
    const items=groups[k].slice().sort((a,b)=>{
      if(st.pSortK){let x,y;
        if(st.pSortK==='value'){x=num(a.value);y=num(b.value);}
        else if(st.pSortK==='updated'){x=dnum(a.updated);y=dnum(b.updated);}
        else{x=(a[st.pSortK]||'').toLowerCase();y=(b[st.pSortK]||'').toLowerCase();}
        if(x<y)return -1*st.pSortDir; if(x>y)return st.pSortDir;
      }
      return dnum(b.updated)-dnum(a.updated);
    });
    const val=items.reduce((s,r)=>s+num(r.value),0);
    html+=`<tr class="grouphdr"><td colspan="${PCOLS.length}"><div class="gh">
      <span class="gname"><span class="dot-st" aria-hidden="true" style="background:${stageColor(k)}"></span>${h(k)}</span>
      <span class="gcount">${items.length}</span>
      <span class="gtot">${val?`<span><b>${fmtMoneyFull(val)}</b></span>`:''}</span>
    </div></td></tr>`;
    items.forEach(r=>{
      const url=safeUrl(r.url);
      const nameCell=url?`<a href="${h(url)}" target="_blank" rel="noopener noreferrer">${h(r.name||'(record)')}</a>`:h(r.name||'(record)');
      html+=`<tr data-ri="${DATA.indexOf(r)}" tabindex="0">
        <td class="person" title="${h(r.name||'')}">${nameCell}</td>
        <td class="hide-xs" title="${h(r.company||'')}">${h(r.company||'—')}</td>
        <td class="hide-sm">${ownerCell(r.owner)}</td>
        <td class="mono hide-xs">${h(r.updated||'—')}</td>
        <td>${valueCell(r)}</td>
        <td class="hide-md">${statusBadge(r)}</td>
      </tr>`;
    });
  });
  tb.innerHTML=html;
  wireRows('#pbody tr[data-ri]','ri');
  document.getElementById('pcnote').textContent=`${rows.length} record${rows.length===1?'':'s'} · ${keys.length} stage${keys.length===1?'':'s'}`;
}

let drawerPrevFocus=null;
function fld(k,v){return v?`<div class="fld"><span class="k">${h(k)}</span><span class="v">${h(v)}</span></div>`:'';}
function openSheet(r){

function blob(r){return `${r.name} — ${r.company}\n${r.status==='active'?'Active':'Open'}${r.stage?' | '+r.stage:''}\nOwner: ${r.owner||'-'}${num(r.value)?' | '+fmtMoneyFull(r.value):''}\n${r.email||''}`;}

  .then(()=>toast(label||'Copied to clipboard','success'))

/* ── toasts ── */
function toast(msg,kind,opts){
  kind=kind||'info';opts=opts||{};
  const c=document.getElementById('toasts');
  while(c.children.length>=4)c.removeChild(c.firstChild);
  const el=document.createElement('div');
  el.className='toast t-'+kind+' t-in';
  el.innerHTML='<span class="ti"></span><span class="tm"></span>';
  el.querySelector('.tm').innerHTML=msg;
  c.appendChild(el);
  const kill=()=>{el.classList.remove('t-in');el.classList.add('t-out');setTimeout(()=>el.remove(),210);};
  el.onclick=kill;
  setTimeout(kill,opts.ms||2600);
}

/* ── confirm modal ── */
let modalDone=null;
function focusables(root){return [...root.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),[tabindex]:not([tabindex="-1"])')].filter(el=>!el.hidden&&el.getClientRects().length&&!el.closest('[inert]'));}
function trapFocus(e,root){
  if(e.key!=='Tab')return false;
  const els=focusables(root);if(!els.length){e.preventDefault();return true;}
  const first=els[0],last=els[els.length-1];
  if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
  return true;
}
function confirmDialog(o){
  return new Promise(res=>{
    const bk=document.getElementById('mbk'),ok=document.getElementById('mok'),cancel=document.getElementById('mcancel'),
      badge=document.getElementById('mbadge');
    document.getElementById('mtitle').textContent=o.title||'';
    document.getElementById('mbody').innerHTML=o.body||'';
    badge.textContent=o.badge||'confirm';
    badge.className='modal-badge'+(o.danger?' danger':'');
    ok.textContent=o.ok||'Confirm';
    ok.className=o.danger?'btn-danger':'btn-primary';
    cancel.textContent=o.cancel||'Cancel';
    cancel.style.display=o.cancel===null?'none':'';
    const prev=document.activeElement;
    const done=v=>{bk.hidden=true;modalDone=null;if(prev&&prev.focus)prev.focus();res(v);};
    modalDone=done;
    ok.onclick=()=>done(true);
    cancel.onclick=()=>done(false);
    bk.onclick=e=>{if(e.target===bk)done(false);};
    bk.hidden=false;
    (cancel.style.display==='none'?ok:cancel).focus();
  });
}
const modalOpen=()=>!document.getElementById('mbk').hidden;

/* ── themes ── */
const THEMES=[['mono','Mono'],['graphite','Graphite'],['phosphor','Phosphor'],['amber','Amber'],['ember','Ember'],
  ['cobalt','Cobalt'],['violet','Violet'],['jade','Jade'],['rose','Rose'],['paper','Paper (light)']];
function setThemeAttr(t){
  if(t==='mono')delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme=t;
}
function applyTheme(t,announce){
  if(!THEMES.some(x=>x[0]===t))t='mono';
  setThemeAttr(t);
  st.theme=t;save();
  requestAnimationFrame(()=>{const m=document.querySelector('meta[name="theme-color"]');
    if(m)m.setAttribute('content',getComputedStyle(document.body).backgroundColor);});
  if(announce)toast('Theme: <b>'+(THEMES.find(x=>x[0]===t)[1])+'</b>','info',{ms:1800});
}
function cycleTheme(){
  const i=THEMES.findIndex(x=>x[0]===st.theme);
  applyTheme(THEMES[(i+1)%THEMES.length][0],true);
}

/* ── row keyboard navigation ── */
let rowIdx=-1;
function wireRows(selector,key){
  const rows=[...document.querySelectorAll(selector)];
  rows.forEach((tr,i)=>{
    const open=()=>openSheet(DATA[+tr.dataset[key]]);
    tr.onclick=e=>{if(!e.target.closest('a,button'))open();};
    tr.onkeydown=e=>{if(e.target===tr&&(e.key==='Enter'||e.key===' ')){e.preventDefault();open();}};
    tr.onfocus=()=>{rowIdx=i;rows.forEach(r=>r.classList.toggle('rowsel',r===tr));};
  });
}
function currentRows(){
  const sel=st.view==='records'?'#body tr[data-i]':'#pbody tr[data-ri]';

function moveRow(d){
  const rows=currentRows();if(!rows.length)return;
  rowIdx=rowIdx<0?(d>0?0:rows.length-1):Math.min(rows.length-1,Math.max(0,rowIdx+d));
  rows.forEach(r=>r.classList.remove('rowsel'));
  const r=rows[rowIdx];r.classList.add('rowsel');
  r.focus({preventScroll:true});
  r.scrollIntoView({block:'nearest'});

function selectedRec(){

function openRowDrawer(){const rows=currentRows();if(rows[rowIdx])rows[rowIdx].click();}

  const u=safeUrl(rec.url);

function copyRowEmail(){

function csvEsc(v){v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCSV(){

async function openAllLinks(){
  const urls=[...new Set(visible().map(r=>safeUrl(r.url)).filter(Boolean))];
  if(!urls.length)return toast('No links in the current view','warning');
  const n=Math.min(urls.length,15);
  const go=await confirmDialog({
    title:'Open '+n+' tab'+(n>1?'s':'')+'?',
    body:'Opens the linked record for each visible row in a new tab.'+
      (urls.length>15?' Capped at 15 of '+urls.length+' — narrow the filter for the rest.':'')+

/* ── command bar ── */
const cbEls={ov:document.getElementById('cbov'),dlg:document.getElementById('cb'),
  q:document.getElementById('cbq'),list:document.getElementById('cblist'),count:document.getElementById('cbcount')};
let cbItems=[],cbSel=0,cbPrevFocus=null;
const cbOpenState=()=>!cbEls.dlg.hidden;
function statCount(v){return v==='all'?DATA.length:DATA.filter(r=>matchesStat(r,v)).length;}
function buildCommands(){
  const c=[];
  const add=(g,ic,t,run,extra)=>c.push(Object.assign({g,ic,t,run},extra||{}));
  /* navigate */
  add('Navigate','→','Go to Records',()=>{setView('records');},{kbd:'g r'});
  add('Navigate','→','Go to Board',()=>{setView('board');},{kbd:'g b'});
  add('Navigate','→','Focus search',()=>{document.getElementById('q').focus();},{kbd:'/'});
  add('Navigate','→','Open selected row details',()=>openRowDrawer(),{kbd:'↵'});
  add('Navigate','→','Open selected row link',()=>openRowLink(),{kbd:'o'});
  if(st.q)add('Navigate','→','Clear search “'+st.q.slice(0,24)+'”',()=>{st.q='';save();renderAll();});
  /* filters */
  [['all','All records'],['active','Active'],['open','Open'],['unowned','Unowned'],['linked','Has link'],['valued','Has value']]
    .forEach(([v,l])=>add('Filter','◐','Filter: '+l,()=>{st.view='records';st.stat=v;save();renderAll();},
      {note:statCount(v)+'',on:st.stat===v&&st.view==='records'}));
  [...new Set(DATA.map(r=>r.source).filter(Boolean))].forEach(s=>
    add('Filter','▤','Source: '+s,()=>{st.view='records';st.src=s;save();renderAll();},
      {note:DATA.filter(r=>r.source===s).length+'',on:st.src===s}));
  add('Filter','▤','Source: all sources',()=>{st.view='records';st.src='all';save();renderAll();},{on:st.src==='all'});
  [['all','All records'],['open','Open only'],['done','Done only']].forEach(([v,l])=>
    add('Filter','◐','Board: '+l,()=>{st.view='board';st.boardStat=v;save();renderAll();},{on:st.view==='board'&&st.boardStat===v}));
  /* sort */
  COLS.forEach(col=>add('Sort','↕','Sort by '+col.label,
    ()=>{st.view='records';if(st.sortK===col.k)st.sortDir*=-1;else{st.sortK=col.k;st.sortDir=1;}save();renderAll();},
    {note:st.sortK===col.k?(st.sortDir<0?'desc':'asc'):''}));
  /* theme */
  THEMES.forEach(([v,l])=>add('Theme','◧','Theme: '+l,()=>applyTheme(v,true),{on:st.theme===v,preview:v}));
  add('Theme','◧','Cycle theme',()=>cycleTheme(),{kbd:'t'});
  /* actions */
  add('Actions','⇣','Export current view as CSV',()=>exportCSV());
  add('Actions','⧉','Copy visible emails',()=>copyVisibleEmails());
  add('Actions','⧉','Copy visible summary',()=>copyVisibleSummary());
  add('Actions','⧉','Copy selected row email',()=>copyRowEmail(),{kbd:'c'});
  add('Actions','↗','Open all visible record links',()=>openAllLinks());
  add('Actions','⌫','Reset workspace (filters, theme, state)',()=>resetWorkspace(),{danger:true});
  /* help */
  add('Help','?','Keyboard shortcuts',()=>showHelp(),{kbd:'?'});
  return c;
}
function fz(q,s){
  q=q.toLowerCase();s=s.toLowerCase();
  if(!q)return 1;
  let qi=0,score=0,last=-2;
  for(let i=0;i<s.length&&qi<q.length;i++){
    if(s[i]===q[qi]){score+=(i===0||s[i-1]===' '||s[i-1]===':'?3:1)+(last===i-1?2:0);last=i;qi++;}
  }
  return qi===q.length?score:0;
}
function cbRender(){
  const q=cbEls.q.value.trim();
  const scored=buildCommands().map(c=>({c,s:fz(q,c.t)+(q?fz(q,c.g)*0.3:0)})).filter(x=>x.s>0);
  if(q)scored.sort((a,b)=>b.s-a.s);
  cbItems=scored.map(x=>x.c);
  cbSel=Math.min(cbSel,Math.max(0,cbItems.length-1));
  if(!cbItems.length){
    cbEls.list.innerHTML='<div class="cb-empty">No matching commands</div>';
    cbEls.count.textContent='0';
    cbEls.q.removeAttribute('aria-activedescendant');
    cbPreview();
    return;
  }
  let html='',lastG='';
  cbItems.forEach((c,i)=>{
    if(!q&&c.g!==lastG){html+='<div class="cb-group" role="presentation">'+h(c.g)+'</div>';lastG=c.g;}
    html+='<div class="cb-item" id="cmdopt-'+i+'" role="option" aria-selected="'+(i===cbSel)+'" data-i="'+i+'"'+(i===cbSel?' data-selected':'')+'>'+
      '<span class="ci-left"><span class="ci-ic" aria-hidden="true">'+h(c.ic)+'</span>'+h(c.t)+
      (c.on?' <span class="ci-note">· active</span>':'')+'</span>'+
      (c.kbd?'<span class="ci-kbd">'+h(c.kbd)+'</span>':(c.note?'<span class="ci-note">'+h(c.note)+'</span>':''))+
      '</div>';
  });
  cbEls.list.innerHTML=html;
  cbEls.count.textContent=cbItems.length+' commands';
  const sel=cbEls.list.querySelector('[data-selected]');
  if(sel){sel.scrollIntoView({block:'nearest'});cbEls.q.setAttribute('aria-activedescendant',sel.id);}
  cbEls.list.querySelectorAll('.cb-item').forEach(el=>{
    el.onclick=()=>cbRun(+el.dataset.i);
    el.onmousemove=()=>{cbEls.list.classList.remove('kbnav');
      if(cbSel!==+el.dataset.i){cbSel=+el.dataset.i;
        cbEls.list.querySelectorAll('.cb-item').forEach(x=>{const on=+x.dataset.i===cbSel;x.toggleAttribute('data-selected',on);x.setAttribute('aria-selected',on);});
        cbEls.q.setAttribute('aria-activedescendant','cmdopt-'+cbSel);
        cbPreview();}};
  });
  cbPreview();
}
/* live theme preview: highlighting a theme command applies it immediately;
   moving off it (or closing without running) restores the saved theme */
function cbPreview(){
  const c=cbItems[cbSel];
  setThemeAttr(c&&c.preview?c.preview:st.theme);
}
function cbOpen(){
  if(cbOpenState())return;
  cbPrevFocus=document.activeElement;
  cbEls.ov.hidden=false;cbEls.dlg.hidden=false;
  cbEls.q.setAttribute('aria-expanded','true');
  cbEls.ov.classList.remove('closing');cbEls.dlg.classList.remove('closing');
  cbEls.q.value='';cbSel=0;cbRender();cbEls.q.focus();
}
function cbClose(keepTheme){
  if(!cbOpenState())return;
  if(!keepTheme)setThemeAttr(st.theme);
  cbEls.q.setAttribute('aria-expanded','false');
  cbEls.q.removeAttribute('aria-activedescendant');
  cbEls.ov.classList.add('closing');cbEls.dlg.classList.add('closing');
  setTimeout(()=>{cbEls.ov.hidden=true;cbEls.dlg.hidden=true;
    cbEls.ov.classList.remove('closing');cbEls.dlg.classList.remove('closing');},150);
  if(cbPrevFocus&&cbPrevFocus.focus)cbPrevFocus.focus();
}
function cbRun(i){
  const c=cbItems[i];if(!c)return;
  cbClose(!!c.preview);
  setTimeout(()=>c.run(),0);
}
cbEls.q.addEventListener('input',()=>{cbSel=0;cbRender();});
cbEls.list.addEventListener('mousemove',()=>cbEls.list.classList.remove('kbnav'));
cbEls.ov.onclick=()=>cbClose();
document.getElementById('cmdopen').onclick=cbOpen;

/* ── global keyboard layer ── */
document.getElementById('dx').onclick=closeSheet;
document.getElementById('scrim').onclick=closeSheet;
const drawerOpen=()=>document.getElementById('drawer').classList.contains('on');
const typing=()=>/^(INPUT|TEXTAREA|SELECT)$/.test((document.activeElement||{}).tagName||'');
let gSeq=false,gTimer=null;
document.addEventListener('keydown',e=>{
  /* modal owns keys while open */
  if(modalOpen()){
    if(e.key==='Escape'){e.preventDefault();modalDone&&modalDone(false);}
    else if(e.key==='Tab')trapFocus(e,document.querySelector('#mbk .modal'));
    if(e.key==='Enter'&&document.activeElement.tagName!=='BUTTON'){e.preventDefault();modalDone&&modalDone(true);}
    return;
  }
  /* command bar toggles */
  if((e.metaKey||e.ctrlKey)&&!e.shiftKey&&(e.key==='k'||e.key===';')){
    e.preventDefault();cbOpenState()?cbClose():cbOpen();return;
  }
  /* palette-scoped keys */
  if(cbOpenState()){
    if(e.key==='Escape'){e.preventDefault();cbClose();}
    else if(e.key==='Tab')trapFocus(e,cbEls.dlg);
    else if(e.key==='ArrowDown'||e.key==='ArrowUp'){
      e.preventDefault();cbEls.list.classList.add('kbnav');
      cbSel=Math.min(Math.max(cbSel+(e.key==='ArrowDown'?1:-1),0),cbItems.length-1);cbRender();
    }
    else if(e.key==='Enter'){e.preventDefault();cbRun(cbSel);}
    return;
  }
  if(drawerOpen()){
    if(e.key==='Escape'){e.preventDefault();closeSheet();}
    else if(e.key==='Tab')trapFocus(e,document.getElementById('drawer'));
    return;
  }
  if(e.key==='Escape'){
    if(drawerOpen())closeSheet();
    else{rowIdx=-1;currentRows().forEach(r=>r.classList.remove('rowsel'));
      if(typing())document.activeElement.blur();}
    return;
  }
  if(typing())return;
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  /* g-sequences */
  if(gSeq){
    gSeq=false;clearTimeout(gTimer);
    if(e.key==='r'){e.preventDefault();setView('records');return;}
    if(e.key==='b'){e.preventDefault();setView('board');return;}
  }
  if(e.key==='g'){gSeq=true;clearTimeout(gTimer);gTimer=setTimeout(()=>gSeq=false,700);return;}
  if(e.key==='/'){e.preventDefault();document.getElementById('q').focus();return;}
  if(e.key==='j'||e.key==='ArrowDown'){e.preventDefault();moveRow(1);return;}
  if(e.key==='k'||e.key==='ArrowUp'){e.preventDefault();moveRow(-1);return;}
  if(e.key==='Enter'&&rowIdx>=0){e.preventDefault();openRowDrawer();return;}
  if(e.key==='o'){e.preventDefault();openRowLink();return;}
  if(e.key==='c'){e.preventDefault();copyRowEmail();return;}
  if(e.key==='t'){e.preventDefault();cycleTheme();return;}
  if(e.key==='?'){e.preventDefault();showHelp();return;}
});
applyTheme(st.theme);
const qi=document.getElementById('q');
qi.addEventListener('input',()=>{st.q=qi.value;save();renderBody();document.getElementById('qclear').style.display=st.q?'block':'none';});
document.getElementById('qclear').onclick=()=>{st.q='';qi.value='';save();renderBody();document.getElementById('qclear').style.display='none';};

document.querySelectorAll('.vtab').forEach((b,i,all)=>{
  b.onclick=()=>setView(b.dataset.view);
  b.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();const next=all[(i+(e.key==='ArrowRight'?1:-1)+all.length)%all.length];setView(next.dataset.view);next.focus();
  }};
});
document.getElementById('meta').textContent=`${DATA.length} records · skeleton data — replace DATA in this file`;
renderAll();
</script>
